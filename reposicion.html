<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <?!= include('estilos'); ?>
</head>
<body>
  <header class="app">
    <div class="marca">INGECO</div>
    <h1>Reposición de combustible</h1>
  </header>

  <div class="wrap">
    <div id="formCard" class="card">
      <form id="form" novalidate>

        <label>Fecha <span class="req">*</span></label>
        <input type="date" id="fecha" required>

        <label>Cantidad de Diesel 500 recargado (litros) <span class="req">*</span></label>
        <input type="number" id="diesel500" inputmode="decimal" min="0" step="0.01" required>

        <label>Cantidad de Infinia 500 recargado (litros) <span class="req">*</span></label>
        <input type="number" id="infinia500" inputmode="decimal" min="0" step="0.01" required>

        <div id="estado" class="estado hidden"></div>

        <div style="height:14px"></div>
        <button type="submit" id="btnEnviar" class="btn">Enviar</button>
        <div style="height:8px"></div>
        <a href="?page=menu" class="btn btn-gris">Volver al menú</a>
      </form>
    </div>

    <div id="okCard" class="card hidden">
      <div class="ok-wrap">
        <div class="ok-tilde">&#10003;</div>
        <div class="ok-msg">Reposición registrada con éxito</div>
        <button id="btnOtra" class="btn">Cargar otra</button>
        <div style="height:8px"></div>
        <a href="?page=menu" class="btn btn-gris">Volver al menú</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('fecha').valueAsDate = new Date();

    const estado = document.getElementById('estado');
    function mostrarError(msg) {
      estado.textContent = msg;
      estado.className = 'estado err';
      estado.classList.remove('hidden');
      estado.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function ocultarEstado() { estado.classList.add('hidden'); }

    const form = document.getElementById('form');
    const btn = document.getElementById('btnEnviar');

    form.addEventListener('submit', function(ev) {
      ev.preventDefault();
      ocultarEstado();

      const data = {
        fecha: document.getElementById('fecha').value,
        diesel500: document.getElementById('diesel500').value,
        infinia500: document.getElementById('infinia500').value
      };

      const faltantes = [];
      if (!data.fecha) faltantes.push('Fecha');
      if (data.diesel500 === '' || isNaN(Number(data.diesel500)) || Number(data.diesel500) < 0)
        faltantes.push('Diesel 500');
      if (data.infinia500 === '' || isNaN(Number(data.infinia500)) || Number(data.infinia500) < 0)
        faltantes.push('Infinia 500');

      if (faltantes.length) {
        mostrarError('Completá: ' + faltantes.join(', '));
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando…';

      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false;
          btn.textContent = 'Enviar';
          if (res && res.ok) {
            document.getElementById('formCard').classList.add('hidden');
            document.getElementById('okCard').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } else {
            mostrarError((res && res.error) ? res.error : 'Error desconocido al guardar.');
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = 'Enviar';
          mostrarError('Error de conexión: ' + (err && err.message ? err.message : err));
        })
        .guardarReposicion(data);
    });

    document.getElementById('btnOtra').addEventListener('click', function() {
      form.reset();
      document.getElementById('fecha').valueAsDate = new Date();
      ocultarEstado();
      document.getElementById('okCard').classList.add('hidden');
      document.getElementById('formCard').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
