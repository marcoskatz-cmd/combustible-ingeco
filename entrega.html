<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <?!= include('estilos'); ?>
</head>
<body>
  <header class="app">
    <div class="marca">INGECO</div>
    <h1>Entrega de combustible</h1>
  </header>

  <div class="wrap">
    <div id="formCard" class="card">
      <form id="form" novalidate>

        <label>Fecha <span class="req">*</span></label>
        <input type="date" id="fecha" required>

        <label>Operario de equipo (nombre y apellido) <span class="req">*</span></label>
        <input type="text" id="operario" autocomplete="off" required>

        <label>Equipo destinatario (tipo, marca y modelo) <span class="req">*</span></label>
        <input type="text" id="equipo" autocomplete="off" required>

        <label>Código interno de equipo / N° de patente <span class="req">*</span></label>
        <div id="codigoWrap">
          <select id="codigoSelect" class="hidden" required>
            <option value="">Cargando códigos…</option>
          </select>
          <input type="text" id="codigoTexto" autocomplete="off" required>
          <small id="codigoHelp" class="help">Cargando códigos válidos…</small>
        </div>

        <label>Estado de horómetro u odómetro <span class="req">*</span></label>
        <select id="estadoHorometro" required>
          <option value="">Elegí una opción</option>
          <option value="Sí funciona">Sí funciona</option>
          <option value="No funciona">No funciona</option>
        </select>

        <label>Horómetro u odómetro actual (horas o km) <span class="req">*</span></label>
        <input type="number" id="horometroActual" inputmode="decimal" min="0" step="0.01" required>

        <label>Lugar de entrega de combustible <span class="req">*</span></label>
        <input type="text" id="lugarEntrega" autocomplete="off" required>

        <label>Cantidad de entrega de combustible (litros) <span class="req">*</span></label>
        <input type="number" id="cantidadLitros" inputmode="decimal" min="0.01" step="0.01" required>

        <label>Tipo de combustible entregado <span class="req">*</span></label>
        <select id="tipoCombustible" required>
          <option value="">Elegí una opción</option>
          <option value="Diesel 500">Diesel 500</option>
          <option value="Diesel Infinia">Diesel Infinia</option>
        </select>

        <label>Firma de operario de equipo <span class="req">*</span></label>
        <div class="firma-wrap">
          <canvas id="firmaOperario" class="firma-canvas"></canvas>
          <div class="firma-acciones">
            <button type="button" data-borrar="firmaOperario">Borrar</button>
          </div>
        </div>

        <label>Firma de responsable (Néstor Leandro Casares) <span class="req">*</span></label>
        <div class="firma-wrap">
          <canvas id="firmaResponsable" class="firma-canvas"></canvas>
          <div class="firma-acciones">
            <button type="button" data-borrar="firmaResponsable">Borrar</button>
          </div>
        </div>

        <div id="estado" class="estado hidden"></div>

        <div style="height:14px"></div>
        <button type="submit" id="btnEnviar" class="btn">Enviar</button>
        <div style="height:8px"></div>
        <a href="?page=menu" class="btn btn-gris">Volver al menú</a>
      </form>
    </div>

    <div id="okCard" class="card hidden">
      <div class="ok-wrap">
        <div class="ok-tilde">&#10003;</div>
        <div class="ok-msg">Entrega registrada con éxito</div>
        <button id="btnOtra" class="btn">Cargar otra</button>
        <div style="height:8px"></div>
        <a href="?page=menu" class="btn btn-gris">Volver al menú</a>
      </div>
    </div>
  </div>

  <script>
    // ====== Init ======
    document.getElementById('fecha').valueAsDate = new Date();

    // ====== Firmas (canvas táctil + mouse vía PointerEvent) ======
    function setupFirma(canvas) {
      const ctx = canvas.getContext('2d');
      let drawing = false;
      let last = null;
      let vacia = true;

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        // Solo redimensionar si está vacía: cambiar el tamaño borra el contenido
        if (!vacia) return;
        canvas.width = rect.width * ratio;
        canvas.height = rect.height * ratio;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#111';
      }
      resize();
      window.addEventListener('resize', resize);

      function pos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      canvas.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        drawing = true;
        last = pos(e);
      });
      canvas.addEventListener('pointermove', function(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = pos(e);
        ctx.beginPath();
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        last = p;
        vacia = false;
      });
      function fin(e) {
        if (!drawing) return;
        drawing = false;
        try { canvas.releasePointerCapture(e.pointerId); } catch(_) {}
      }
      canvas.addEventListener('pointerup', fin);
      canvas.addEventListener('pointercancel', fin);
      canvas.addEventListener('pointerleave', fin);

      return {
        borrar: function() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          vacia = true;
          resize();
        },
        vacia: function() { return vacia; },
        toDataURL: function() { return canvas.toDataURL('image/png'); }
      };
    }

    const firmaOp = setupFirma(document.getElementById('firmaOperario'));
    const firmaResp = setupFirma(document.getElementById('firmaResponsable'));
    const firmas = { firmaOperario: firmaOp, firmaResponsable: firmaResp };

    document.querySelectorAll('[data-borrar]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        firmas[btn.getAttribute('data-borrar')].borrar();
      });
    });

    // ====== Códigos de equipos (dropdown con fallback a texto libre) ======
    google.script.run
      .withSuccessHandler(function(res) {
        const sel = document.getElementById('codigoSelect');
        const txt = document.getElementById('codigoTexto');
        const help = document.getElementById('codigoHelp');
        if (res && res.ok && res.codigos && res.codigos.length) {
          sel.innerHTML = '<option value="">Elegí un código…</option>' +
            res.codigos.map(function(c) {
              return '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
            }).join('');
          sel.classList.remove('hidden');
          txt.classList.add('hidden');
          txt.removeAttribute('required');
          sel.setAttribute('required', 'required');
          help.textContent = res.codigos.length + ' códigos cargados desde la planilla maestra.';
        } else {
          // Fallback: input de texto libre
          help.textContent = 'No se pudo leer la planilla de códigos. Escribilo a mano.';
        }
      })
      .withFailureHandler(function() {
        document.getElementById('codigoHelp').textContent =
          'No se pudo leer la planilla de códigos. Escribilo a mano.';
      })
      .getCodigosEquipos();

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ====== Estado UI ======
    const estado = document.getElementById('estado');
    function mostrarError(msg) {
      estado.textContent = msg;
      estado.className = 'estado err';
      estado.classList.remove('hidden');
      estado.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function ocultarEstado() {
      estado.classList.add('hidden');
    }

    // ====== Submit ======
    const form = document.getElementById('form');
    const btn = document.getElementById('btnEnviar');

    form.addEventListener('submit', function(ev) {
      ev.preventDefault();
      ocultarEstado();

      const sel = document.getElementById('codigoSelect');
      const txt = document.getElementById('codigoTexto');
      const codigoInterno = sel.classList.contains('hidden')
        ? txt.value.trim()
        : sel.value.trim();

      const data = {
        fecha: document.getElementById('fecha').value,
        operario: document.getElementById('operario').value.trim(),
        equipo: document.getElementById('equipo').value.trim(),
        codigoInterno: codigoInterno,
        estadoHorometro: document.getElementById('estadoHorometro').value,
        horometroActual: document.getElementById('horometroActual').value,
        lugarEntrega: document.getElementById('lugarEntrega').value.trim(),
        cantidadLitros: document.getElementById('cantidadLitros').value,
        tipoCombustible: document.getElementById('tipoCombustible').value,
        firmaOperario: '',
        firmaResponsable: ''
      };

      // Validación cliente
      const faltantes = [];
      if (!data.fecha) faltantes.push('Fecha');
      if (!data.operario) faltantes.push('Operario');
      if (!data.equipo) faltantes.push('Equipo');
      if (!data.codigoInterno) faltantes.push('Código interno');
      if (!data.estadoHorometro) faltantes.push('Estado de horómetro');
      if (data.horometroActual === '' || isNaN(Number(data.horometroActual)))
        faltantes.push('Horómetro actual');
      if (!data.lugarEntrega) faltantes.push('Lugar de entrega');
      if (data.cantidadLitros === '' || isNaN(Number(data.cantidadLitros)) || Number(data.cantidadLitros) <= 0)
        faltantes.push('Cantidad (litros)');
      if (!data.tipoCombustible) faltantes.push('Tipo de combustible');
      if (firmaOp.vacia()) faltantes.push('Firma operario');
      if (firmaResp.vacia()) faltantes.push('Firma responsable');

      if (faltantes.length) {
        mostrarError('Completá: ' + faltantes.join(', '));
        return;
      }

      data.firmaOperario = firmaOp.toDataURL();
      data.firmaResponsable = firmaResp.toDataURL();

      btn.disabled = true;
      btn.textContent = 'Enviando…';

      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false;
          btn.textContent = 'Enviar';
          if (res && res.ok) {
            document.getElementById('formCard').classList.add('hidden');
            document.getElementById('okCard').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } else {
            mostrarError((res && res.error) ? res.error : 'Error desconocido al guardar.');
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = 'Enviar';
          mostrarError('Error de conexión: ' + (err && err.message ? err.message : err));
        })
        .guardarEntrega(data);
    });

    document.getElementById('btnOtra').addEventListener('click', function() {
      form.reset();
      document.getElementById('fecha').valueAsDate = new Date();
      firmaOp.borrar();
      firmaResp.borrar();
      ocultarEstado();
      document.getElementById('okCard').classList.add('hidden');
      document.getElementById('formCard').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
