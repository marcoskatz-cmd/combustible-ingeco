<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Reposición de combustible</title>
  <link rel="stylesheet" href="estilos.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a4d8c">
  <link rel="icon" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Combustible">
  <script src="pwa.js" defer></script>
</head>
<body>
  <header class="app">
    <div class="marca">INGECO</div>
    <h1>Reposición de combustible</h1>
  </header>

  <div class="wrap">
    <div id="formCard" class="card">
      <label>Fecha <span class="req">*</span></label>
      <input type="date" id="fecha" required>

      <label>Cantidad de Diesel 500 recargado (litros) <span class="req">*</span></label>
      <input type="number" id="diesel500" inputmode="decimal" min="0" step="0.01" required>

      <label>Cantidad de Infinia 500 recargado (litros) <span class="req">*</span></label>
      <input type="number" id="infinia500" inputmode="decimal" min="0" step="0.01" required>

      <label>Firma de responsable (Néstor Leandro Casares) <span class="req">*</span></label>
      <div class="firma-wrap">
        <canvas id="firmaResponsable" class="firma-canvas"></canvas>
        <div class="firma-acciones">
          <button type="button" data-borrar="firmaResponsable">Borrar</button>
        </div>
      </div>

      <div id="estado" class="estado hidden"></div>

      <div style="height:14px"></div>
      <button type="button" id="btnEnviar" class="btn">Enviar</button>
      <div style="height:8px"></div>
      <a href="index.html" class="btn btn-gris">Volver al menú</a>
    </div>

    <div id="okCard" class="card hidden">
      <div class="ok-wrap">
        <div class="ok-tilde">&#10003;</div>
        <div class="ok-msg">Reposición registrada con éxito</div>
        <button id="btnOtra" class="btn">Cargar otra</button>
        <div style="height:8px"></div>
        <a href="index.html" class="btn btn-gris">Volver al menú</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    document.getElementById('fecha').valueAsDate = new Date();

    // ====== Firma (canvas pointer events) ======
    function setupFirma(canvas) {
      const ctx = canvas.getContext('2d');
      let drawing = false;
      let last = null;
      let vacia = true;

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        if (!vacia) return;
        canvas.width = rect.width * ratio;
        canvas.height = rect.height * ratio;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#111';
      }
      resize();
      window.addEventListener('resize', resize);

      function pos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      canvas.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        drawing = true;
        last = pos(e);
      });
      canvas.addEventListener('pointermove', function(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = pos(e);
        ctx.beginPath();
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        last = p;
        vacia = false;
      });
      function fin(e) {
        if (!drawing) return;
        drawing = false;
        try { canvas.releasePointerCapture(e.pointerId); } catch(_) {}
      }
      canvas.addEventListener('pointerup', fin);
      canvas.addEventListener('pointercancel', fin);
      canvas.addEventListener('pointerleave', fin);

      return {
        borrar: function() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          vacia = true;
          resize();
        },
        vacia: function() { return vacia; },
        toDataURL: function() { return canvas.toDataURL('image/png'); }
      };
    }

    const firmaResp = setupFirma(document.getElementById('firmaResponsable'));
    document.querySelectorAll('[data-borrar]').forEach(function(b) {
      b.addEventListener('click', function() { firmaResp.borrar(); });
    });

    const estado = document.getElementById('estado');
    function mostrarError(msg) {
      estado.textContent = msg;
      estado.className = 'estado err';
      estado.classList.remove('hidden');
      estado.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function ocultarEstado() { estado.classList.add('hidden'); }

    const btn = document.getElementById('btnEnviar');

    btn.addEventListener('click', async function() {
      ocultarEstado();
      const data = {
        action: 'guardarReposicion',
        fecha: document.getElementById('fecha').value,
        diesel500: document.getElementById('diesel500').value,
        infinia500: document.getElementById('infinia500').value,
        firmaResponsable: ''
      };
      const faltantes = [];
      if (!data.fecha) faltantes.push('Fecha');
      if (data.diesel500 === '' || isNaN(Number(data.diesel500)) || Number(data.diesel500) < 0)
        faltantes.push('Diesel 500');
      if (data.infinia500 === '' || isNaN(Number(data.infinia500)) || Number(data.infinia500) < 0)
        faltantes.push('Infinia 500');
      if (firmaResp.vacia()) faltantes.push('Firma responsable');
      if (faltantes.length) {
        mostrarError('Completá: ' + faltantes.join(', '));
        return;
      }
      data.firmaResponsable = firmaResp.toDataURL();
      btn.disabled = true;
      btn.textContent = 'Enviando…';
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(function() { ctrl.abort(); }, 60000);
        const resp = await fetch(window.PROXY_URL, {
          method: 'POST',
          credentials: 'omit',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
          signal: ctrl.signal
        });
        clearTimeout(timer);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const res = await resp.json();
        if (res.ok) {
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('okCard').classList.remove('hidden');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          mostrarError(res.error || 'Error desconocido al guardar.');
        }
      } catch (err) {
        mostrarError('Error de conexión: ' + (err && err.message ? err.message : err));
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar';
      }
    });

    document.getElementById('btnOtra').addEventListener('click', function() {
      document.getElementById('fecha').valueAsDate = new Date();
      ['diesel500','infinia500'].forEach(function(id) { document.getElementById(id).value = ''; });
      firmaResp.borrar();
      ocultarEstado();
      document.getElementById('okCard').classList.add('hidden');
      document.getElementById('formCard').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
